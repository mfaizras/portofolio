name: Build to build-branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # penting: jangan pakai kredensial default checkout

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish ONLY dist contents to build branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          test -d dist
          cd dist

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Build: ${GITHUB_SHA}"

          git branch -M build

          # Remote pakai token (tanpa trailing slash)
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"

          git push -f origin build
